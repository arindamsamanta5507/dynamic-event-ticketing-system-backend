server:
  port: 8080

spring:
  application:
    name: ticketing

  # 1. MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3307/ticketing_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Arindam
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA / Hibernate Configuration
  jpa:
    hibernate:
      # 'update' will modify tables if your Java Entities change.
      # 'validate' is safer for prod, but 'update' is great for prototyping.
      ddl-auto: update
    show-sql: true  # This will print our SQL queries in the console (helpful for debugging locks)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 3. Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

  # 4. Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer